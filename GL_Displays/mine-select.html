<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Выбор шахты</title>
  <link rel="stylesheet" href="../css/common.css">
</head>
<body>
  <h2 class="title">Шахты</h2>

  <div class="mine-wrapper">
    <!-- обычная — сразу доступна -->
    <div class="mine-card" id="btn-normal">
      <img src="../assets/mine_normal.png" alt="normal">
      <span>Обычная</span>
    </div>

    <!-- редкая — серым, пока уровень < 4 -->
    <div class="mine-card locked" id="btn-rare">
      <img src="../assets/mine_rare.png" alt="rare">
      <span>Редкая<br><small>(с 4-го ур.)</small></span>
    </div>
  </div>

  <!-- логика выбора -->
  <script type="module" src="../js/mine-select.js"></script>
</body>
</html>
