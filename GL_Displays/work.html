<section class="screen-card work-screen">
  <div class="profile-head">
    <div class="profile-avatar">💼</div>

    <div class="profile-head-info">
      <p class="eyebrow">РАБОТА</p>
      <h2>Выберите работу</h2>
      <p class="subtext">Каждая работа развивает свой навык и приносит доход.</p>
    </div>
  </div>

  <div class="profile-tags">
    <span class="profile-tag" id="workPlayerName">Игрок</span>
    <span class="profile-tag" id="workPlayerId">ID —</span>
    <span class="profile-tag" id="workPlayerBalance">0 ₴</span>
  </div>

  <div class="work-jobs-grid">
    <button class="job-card" id="openFarmJobBtn" type="button">
      <div class="job-card-icon">🌾</div>
      <div class="job-card-body">
        <h3>Ферма</h3>
        <p>Собирайте урожай, избегайте вредителей и качайте навык фермера.</p>
      </div>
    </button>

    <button class="job-card" id="openMineJobBtn" type="button">
      <div class="job-card-icon">⛏️</div>
      <div class="job-card-body">
        <h3>Шахта</h3>
        <p>Скоро здесь будет добыча ресурсов и развитие шахтёра.</p>
      </div>
    </button>

    <button class="job-card locked" type="button" disabled>
      <div class="job-card-icon">🏭</div>
      <div class="job-card-body">
        <h3>Завод</h3>
        <p>В разработке. Производственные профессии откроем позже.</p>
      </div>
    </button>

    <button class="job-card locked" type="button" disabled>
      <div class="job-card-icon">📦</div>
      <div class="job-card-body">
        <h3>Склад</h3>
        <p>В разработке. Логистика и складские операции будут позже.</p>
      </div>
    </button>

    <button class="job-card locked" type="button" disabled>
      <div class="job-card-icon">🏗️</div>
      <div class="job-card-body">
        <h3>Стройка</h3>
        <p>В разработке. Тяжёлый труд и строй-навыки будут позже.</p>
      </div>
    </button>
  </div>

  <button class="primary-btn" id="workBackBtn">Назад</button>
</section>
