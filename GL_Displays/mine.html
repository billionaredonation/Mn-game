<section class="screen-card mine-screen">
  <div class="mine-top">
    <div class="mine-head-text">
      <p class="eyebrow">ШАХТА</p>
      <h2>Добыча ресурсов</h2>
      <p class="subtext">Выбирайте между риском и стабильной добычей.</p>
    </div>

    <div class="mine-head-icon">⛏️</div>
  </div>

  <div class="mine-progress-card">
    <div class="mine-progress-top">
      <strong class="mine-profession-title">
        Шахтёр <span id="mineLevelChip">Ур. 1</span>
      </strong>
      <span class="mine-progress-text" id="mineXpValue">0 / 10000 XP</span>
    </div>

    <div class="mine-progress-bar">
      <div class="mine-progress-fill" id="mineProgressFill" style="width: 0%;"></div>
    </div>
  </div>

  <div class="mine-stats-grid">
    <div class="mine-stat-box">
      <span>Добыто</span>
      <strong id="mineHitsValue">0</strong>
    </div>

    <div class="mine-stat-box">
      <span>Ошибки</span>
      <strong id="mineMistakesValue">0</strong>
    </div>

    <div class="mine-stat-box">
      <span>Вал</span>
      <strong id="mineGrossMoneyValue">0 ₴</strong>
    </div>

    <div class="mine-stat-box">
      <span>Штраф</span>
      <strong id="minePenaltyValue">0 ₴</strong>
    </div>

    <div class="mine-stat-box mine-stat-box-total">
      <span>Итого</span>
      <strong id="mineNetMoneyValue">0 ₴</strong>
    </div>
  </div>

  <div class="mine-legend-card">
    <div class="mine-legend-row">
      <span class="mine-legend-icon">🟫</span>
      <span class="mine-legend-text">Земля</span>
      <strong>+2 ₴ / пустота -4 ₴</strong>
    </div>

    <div class="mine-legend-row">
      <span class="mine-legend-icon">🟧</span>
      <span class="mine-legend-text">Песок</span>
      <strong>+2 ₴ / обвал</strong>
    </div>

    <div class="mine-legend-row">
      <span class="mine-legend-icon">🗿</span>
      <span class="mine-legend-text">Камень</span>
      <strong>+10 ₴</strong>
    </div>

    <div class="mine-legend-row">
      <span class="mine-legend-icon">🔩</span>
      <span class="mine-legend-text">Металл</span>
      <strong>+15 ₴</strong>
    </div>
  </div>

  <div class="mine-save-card">
    <div class="mine-save-top">
      <span>Автосейв</span>
      <strong id="mineAutosaveInfo">0 / 3</strong>
    </div>

    <div class="mine-save-bar">
      <div class="mine-save-fill" id="mineAutosaveFill" style="width: 0%;"></div>
    </div>
  </div>

  <div class="mine-board" id="mineBoard"></div>

  <div class="mine-bottom-tip">
    Песок опасен: при обвале сгорает несохранённый доход.
  </div>

  <div class="mine-controls">
    <button class="primary-btn" id="mineBackBtn">Назад</button>
  </div>
  </section>
