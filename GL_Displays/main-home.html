<section class="main-home">
  <div class="main-header-card">
    <div class="main-top-row">
      <div class="player-badge" id="playerBadge">MN</div>

      <div class="player-text">
        <h2 class="player-name" id="playerName">Игрок</h2>
        <p class="player-meta" id="playerMeta">Профиль игрока</p>
      </div>
    </div>

    <div class="main-top-row">
      <div class="city-chip" id="playerCityChip">Город</div>
    </div>

    <div class="bonus-box">
      <p class="bonus-label">БОНУС ГОРОДА</p>
      <p class="bonus-value" id="cityBonus">—</p>
    </div>
  </div>

  <div class="main-stats-card">
    <div class="stats-grid">
      <div class="stat-box">
        <p class="stat-label">БАЛАНС</p>
        <p class="stat-value" id="balanceValue">0 ₴</p>
      </div>

      <div class="stat-box">
        <p class="stat-label">УРОВЕНЬ</p>
        <p class="stat-value" id="levelValue">1</p>
      </div>

      <div class="stat-box">
        <p class="stat-label">ОПЫТ</p>
        <p class="stat-value" id="xpValue">0 XP</p>
      </div>

      <div class="stat-box">
        <p class="stat-label">СТАРТ-БОНУС</p>
        <p class="stat-value" id="startBonusValue">—</p>
      </div>
    </div>
  </div>

  <div class="main-grid-card">
    <p class="section-title">РАЗДЕЛЫ</p>

    <div class="icon-grid">
      <button type="button" class="icon-card" data-section="Работа">
        <div class="icon-badge">💼</div>
        <div class="icon-title">Работа</div>
      </button>

      <button type="button" class="icon-card" data-section="Профиль">
        <div class="icon-badge">👤</div>
        <div class="icon-title">Профиль</div>
      </button>

      <button type="button" class="icon-card" data-section="Магазин">
        <div class="icon-badge">🛒</div>
        <div class="icon-title">Магазин</div>
      </button>

      <button type="button" class="icon-card" data-section="Ежедневка">
        <div class="icon-badge">🎁</div>
        <div class="icon-title">Ежедневка</div>
      </button>

      <button type="button" class="icon-card" data-section="Квесты">
        <div class="icon-badge">📜</div>
        <div class="icon-title">Квесты</div>
      </button>

      <button type="button" class="icon-card" data-section="Навыки">
        <div class="icon-badge">⚡</div>
        <div class="icon-title">Навыки</div>
      </button>
    </div>
  </div>
</section>
