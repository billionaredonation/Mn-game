<section class="screen-card profile-screen">
  <div class="profile-head">
    <div class="profile-avatar" id="profileAvatar">MN</div>

    <div class="profile-head-info">
      <p class="eyebrow">ПРОФИЛЬ ИГРОКА</p>
      <h2 id="profileNickname">Игрок</h2>
      <p class="subtext" id="profileGender">Персонаж</p>
    </div>
  </div>

  <div class="profile-tags">
    <span class="profile-tag" id="profileCity">Город</span>
    <span class="profile-tag" id="profilePlayerId">ID —</span>
  </div>

  <div class="profile-main-card">
    <p class="eyebrow">ОСНОВНЫЕ ДАННЫЕ</p>

    <div class="profile-rows">
      <div class="profile-row">
        <span>Ник</span>
        <strong id="profileNicknameRow">—</strong>
      </div>

      <div class="profile-row">
        <span>Пол</span>
        <strong id="profileGenderRow">—</strong>
      </div>

      <div class="profile-row">
        <span>Город</span>
        <strong id="profileCityRow">—</strong>
      </div>

      <div class="profile-row">
        <span>Бонус города</span>
        <strong id="profileCityBonusRow">—</strong>
      </div>
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <span class="stat-label">БАЛАНС</span>
      <strong class="stat-value" id="profileBalance">0 ₴</strong>
    </div>

    <div class="stat-card">
      <span class="stat-label">УРОВЕНЬ</span>
      <strong class="stat-value" id="profileLevel">1</strong>
    </div>

    <div class="stat-card">
      <span class="stat-label">ОПЫТ</span>
      <strong class="stat-value" id="profileXp">0 XP</strong>
    </div>

    <div class="stat-card">
      <span class="stat-label">РЕПУТАЦИЯ</span>
      <strong class="stat-value" id="profileReputation">0</strong>
    </div>
  </div>

  <div class="profile-main-card">
    <p class="eyebrow">СТАТУС</p>

    <div class="profile-rows">
      <div class="profile-row">
        <span>Энергия</span>
        <strong id="profileEnergy">100</strong>
      </div>

      <div class="profile-row">
        <span>UUID</span>
        <strong id="profileUuid">—</strong>
      </div>
    </div>
  </div>

  <button class="primary-btn" id="profileBackBtn">Назад</button>
      </section>
