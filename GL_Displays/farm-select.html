<section class="screen-card work-screen">
  <div class="profile-head">
    <div class="profile-avatar">👨‍🌾</div>

    <div class="profile-head-info">
      <p class="eyebrow">ФЕРМЫ</p>
      <h2>Выберите ферму</h2>
      <p class="subtext">Каждая ферма даёт свой стиль прогресса.</p>
    </div>
  </div>

  <div class="job-list">
    <div class="job-card farm-pick-card">
      <div class="farm-card-main">
        <div class="farm-card-left">
          <div class="job-icon">🌱</div>

          <div class="job-info">
            <strong>Ферма новичков</strong>
            <span>Лёгкий старт и стабильный доход</span>
          </div>
        </div>

        <button type="button" class="info-mini-btn" id="farmInfoBasic">i</button>
      </div>

      <div class="farm-card-actions">
        <button type="button" class="secondary-btn farm-open-btn" id="openFarmBasicBtn">
          Открыть
        </button>
      </div>
    </div>

    <div class="job-card farm-pick-card">
      <div class="farm-card-main">
        <div class="farm-card-left">
          <div class="job-icon">🍇</div>

          <div class="job-info">
            <strong>Ферма редких культур</strong>
            <span>Для игроков 3 уровня и выше</span>
          </div>
        </div>

        <button type="button" class="info-mini-btn" id="farmInfoRare">i</button>
      </div>

      <div class="farm-card-actions">
        <button type="button" class="secondary-btn farm-open-btn" id="openFarmRareBtn">
          Открыть
        </button>
      </div>
    </div>
  </div>

  <button class="primary-btn" id="farmSelectBackBtn">Назад</button>
</section>
